# Source a file (multi-file configs)
source = ~/.config/hypr/env.conf
source = ~/.config/hypr/keybind.conf
source = ~/.config/hypr/mocha.conf
source = ~/.config/hypr/monitor.conf
source = ~/.config/hypr/rules.conf
source = ~/.config/hypr/startup.conf

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    follow_mouse = 1

    touchpad {
      clickfinger_behavior = true
        natural_scroll = true
        tap-and-drag = true
        drag_lock = true
        middle_button_emulation = true
        scroll_factor = 0.5
    }
  sensitivity = -0.3 # -1.0 - 1.0, 0 means no modification.
}

# See https://wiki.hyprland.org/Configuring/Variables/ for more
general {
  gaps_in = 2
    gaps_out = 6
    border_size = 1
    col.active_border =  $surface0
    col.inactive_border =  $charcoal

    layout = dwindle
    cursor_inactive_timeout = 0
    resize_on_border = true
    hover_icon_on_border = true
}

decoration {
  rounding = 8

    blur {
      enabled = false
      size = 12
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        noise = 0.1
        contrast = 1.1
        brightness = 1.2
        xray = false       
    }

    active_opacity = 1
    inactive_opacity = 1
    fullscreen_opacity = 1

    drop_shadow = true
    shadow_ignore_window = true
    shadow_offset = 0 8
    shadow_range = 50
    shadow_render_power = 3
    col.shadow = rgba(00000055)
}

misc {
  disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
    vrr=1
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    background_color = $lavender
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true  
    new_window_takes_over_fullscreen = 1
}

animations {
  enabled = true
    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92 
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = fluent_decel, 0.1, 1, 0, 1
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1

    # Animation configs
    animation = windows, 1, 2, hyprnostretch, popin 60%
    animation = border, 1, 2, default
    animation = fade, 1, 2, md3_decel
    animation = workspaces, 1, 1.5, easeOutCirc, slide
    animation = specialWorkspace, 1, 2, md3_decel, slidevert
}

dwindle {
  pseudotile = true
   smart_split = false
   preserve_split = true # you probably want this
   force_split = 2
}

gestures {
# See https://wiki.hyprland.org/Configuring/Variables/ for more
  workspace_swipe = true
    workspace_swipe_distance = 700
    workspace_swipe_fingers = 3
    workspace_swipe_cancel_ratio = 0.2
    workspace_swipe_min_speed_to_force = 5

    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 0

    workspace_swipe_create_new = true
}

xwayland {
  force_zero_scaling = true
}

