# ---------------- Size ---------------- #
windowrulev2 = size 40% 40%,class:^(blueman-manager)$

# ---------------- Window ---------------- #
# Window opacity
windowrulev2 = opaque,class:^(Chromium)$
windowrulev2 = opaque,class:^(firefox)$
windowrulev2 = opaque,class:^(Thorium-browser)$
windowrulev2 = opaque,title:^(GNU Image Manipulation Program)$
windowrulev2 = opaque,class:^(org.inkscape.Inkscape)$
windowrulev2 = opaque,class:^(blender)$
windowrulev2 = opaque,class:^()$

# ---------------- Noblur ---------------- #
windowrulev2 = noblur,class:^(Chromium)$
windowrulev2 = noblur,class:^(Thorium-browser)$
windowrulev2 = noblur,title:^(GNU Image Manipulation Program)$
windowrulev2 = noblur,class:^(org.inkscape.Inkscape)$
windowrulev2 = noblur,class:^(blender)$
windowrulev2 = noblur,class:^(Rofi)$
windowrulev2 = noblur,class:^()$

# ---------------- Nofullscreenrequest ---------------- #
windowrulev2 = nofullscreenrequest,title:^(Attention)$
windowrulev2 = nofullscreenrequest,title:^(Warning)$
windowrulev2 = nofullscreenrequest,title:^(File Operation Progress)$
windowrulev2 = nofullscreenrequest,title:^(branchdialog)$
windowrulev2 = nofullscreenrequest,title:^(Confirm to replace files)$
windowrulev2 = nofullscreenrequest,title:^(polkit-gnome-authentication-agent-1)$
windowrulev2 = nofullscreenrequest,title:^(pavucontrol)$
windowrulev2 = nofullscreenrequest,class:^(blueman-manager)$
windowrulev2 = nofullscreenrequest,class:^(nm-connection-editor)$

# ---------------- Center ---------------- #
windowrulev2 = center 1,title:^(Attention)$
windowrulev2 = center 1,title:^(Warning)$
windowrulev2 = center 1,title:^(File Operation Progress)$
windowrulev2 = center 1,title:^(branchdialog)$
windowrulev2 = center 1,title:^(Confirm to replace files)$
windowrulev2 = center 1,title:^(polkit-gnome-authentication-agent-1)$
windowrulev2 = center 1,title:^(pavucontrol)$
windowrulev2 = center 1,class:^(blueman-manager)$
windowrulev2 = center 1,class:^(org.gnome.Loupe)$
windowrulev2 = center 1,class:^(nm-connection-editor)$

# ---------------- Nomaximizerequest ---------------- #
windowrulev2 = nomaximizerequest,title:^(Attention)$
windowrulev2 = nomaximizerequest,title:^(Warning)$
windowrulev2 = nomaximizerequest,title:^(File Operation Progress)$
windowrulev2 = nomaximizerequest,title:^(branchdialog)$
windowrulev2 = nomaximizerequest,title:^(Confirm to replace files)$
windowrulev2 = nomaximizerequest,title:^(polkit-gnome-authentication-agent-1)$
windowrulev2 = nomaximizerequest,title:^(pavucontrol)$
windowrulev2 = nomaximizerequest,class:^(blueman-manager)$
windowrulev2 = nomaximizerequest,class:^(nm-connection-editor)$

# ---------------- Pin ---------------- #
windowrulev2 = pin,title:^(Attention)$
windowrulev2 = pin,title:^(Warning)$
windowrulev2 = pin,title:^(File Operation Progress)$
windowrulev2 = pin,title:^(branchdialog)$
windowrulev2 = pin,title:^(Confirm to replace files)$
windowrulev2 = pin,class:^(polkit-gnome-authentication-agent-1)$
windowrulev2 = pin,class:^(pavucontrol)$
windowrulev2 = pin,class:^(blueman-manager)$
windowrulev2 = pin,class:^(Rofi)$
windowrulev2 = pin,class:^(nm-connection-editor)$

# ---------------- Window type ---------------- #
windowrulev2 = float,title:^(Attention)$
windowrulev2 = float,title:^(Warning)$
windowrulev2 = float,title:^(branchdialog)$
windowrulev2 = float,title:^(Confirm to replace files)$
windowrulev2 = float,title:^(File Operation Progress)$
windowrulev2 = float,class:^(polkit-gnome-authentication-agent-1)$
windowrulev2 = float,class:^(pavucontrol)$
windowrulev2 = float,class:^(org.gnome.Loupe)$
windowrulev2 = float,class:^(blueman-manager)$
windowrulev2 = float,class:^(nm-connection-editor)$

# ---------------- Layer ---------------- #
layerrule = blur, rofi
layerrule = blur, notifications
layerrule = blur, lockscreen
layerrule = blur, lock
layerrule = blur, swaylock
layerrule = blur, gtk-layer-shell

layerrule = xray 0, gtk-layer-shell

layerrule = ignorezero, rofi
layerrule = ignorezero, gtk-layer-shell
layerrule = ignorezero, notifications
layerrule = ignorezero, waybar
layerrule = ignorezero, tray
layerrule = ignorezero, $()^
